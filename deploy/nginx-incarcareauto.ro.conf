# Nginx — incarcareauto.ro (ChargePro Next.js pe port 3001)
# Server: 75.119.140.89 (același server cu cluj-press.ro)
#
# Instalare:
#   sudo cp deploy/nginx-incarcareauto.ro.conf /etc/nginx/sites-available/incarcareauto.ro
#   sudo ln -s /etc/nginx/sites-available/incarcareauto.ro /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
#   sudo certbot --nginx -d incarcareauto.ro -d www.incarcareauto.ro

server {
    listen 80;
    listen [::]:80;
    server_name incarcareauto.ro www.incarcareauto.ro;

    # Certbot adaugă automat redirect HTTPS după SSL

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
