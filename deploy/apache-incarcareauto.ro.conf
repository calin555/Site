# Apache — incarcareauto.ro (proxy către Next.js pe port 3001)
# Server: 75.119.140.89
#
# Instalare (Debian/Ubuntu):
#   sudo a2enmod proxy proxy_http headers ssl rewrite
#   sudo cp deploy/apache-incarcareauto.ro.conf /etc/apache2/sites-available/incarcareauto.ro.conf
#   sudo a2ensite incarcareauto.ro.conf
#   sudo apache2ctl configtest
#   sudo systemctl reload apache2
#   sudo certbot --apache -d incarcareauto.ro -d www.incarcareauto.ro

<VirtualHost *:80>
    ServerName incarcareauto.ro
    ServerAlias www.incarcareauto.ro

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:3001/
    ProxyPassReverse / http://127.0.0.1:3001/

    ErrorLog ${APACHE_LOG_DIR}/incarcareauto-error.log
    CustomLog ${APACHE_LOG_DIR}/incarcareauto-access.log combined
</VirtualHost>
