services:
  postgres:
    image: postgres:16-alpine
    container_name: ev-charging-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: evstore
      POSTGRES_PASSWORD: evstore
      POSTGRES_DB: ev_charging_store
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
